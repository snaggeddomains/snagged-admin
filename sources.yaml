# Source registry — single source of truth for what runs and where outputs go.
# See docs/domain-dumps-and-platform-workflows-spec.md §4.1 for the schema.

version: 1

storage:
  # Tier 2: raw dump archive. Last few raw fetches per URL/API source, for
  # replay/debugging/re-ingest. Drive-native sources (atom_daily,
  # drive_auction_uploads, atom_wholesale) read in place, NOT cached here.
  pipeline_raw_cache_folder_id: "15HLcwq685L0VEuDioiBkf0_17BWkEEdl"
  pipeline_raw_cache_retention_days: 7

products:
  snap:
    sheet_id: "1FVgWVZMKDCVMXbkY0_SSfU73LCN29uyly7Tn6dUp8R8"
    sheet_title: "Top Names (Stimpy)"
    slack_channel_env: SLACK_CHANNEL_SNAP        # default C09B1P21YQ0
    atom_wholesale_sheet_id: "1vrBxktnZ6cK5pY_w5EZa6DOA0E4OLU_Qs6x-fztDclw"
    atom_wholesale_sheet_title: "Atom Wholesale RUNNING"
    # Observed tabs: KEY (user legend -- DO NOT WRITE),
    #                Today's New Listings, Running Good Deals, Sedo Net-New
    do_not_write_tabs:
      - "KEY"
  auctions:
    sheet_id: "1-k9SNFNm6ontOC6_P8wW3PTMk65YYpSAx7kM4rmKjks"
    sheet_title: "Auction and Good Deal Domains"
    slack_channel_env: SLACK_CHANNEL_AUCTIONS    # default C096AT8BECS

# Filter profiles applied per-source. Two separate jobs:
#   - standard_listings: strict daily filter that picks single English
#     dictionary words for the SNAP Slack/Sheets feed AND the auctions
#     watchlist. Word-frequency (zipf) based. Mirrors
#     legacy/openclaw/scripts/domain_filters.py.
#   - universe_ingest: broader filter, for the Tier 3 name universe (R2). Wider
#     candidate pool for future brand-naming workflows.
filter_profiles:
  universe_ingest:
    label: "Universal Naming Parameters"
    allowed_tlds: [".com", ".co", ".ai", ".net", ".xyz", ".dev", ".org"]
    sld_length_min: 2
    sld_length_max: 14
    allow_digits: false
    allow_hyphens: false
    require_vowel: true
    dedup_by_domain: true

  standard_listings:
    label: "SNAP + Auction Parameters"
    legacy_module: legacy/openclaw/scripts/domain_filters.py
    allowed_tlds: [".com", ".org", ".net", ".io", ".ai", ".co"]
    zipf_min: 2.8
    zipf_overrides_by_tld:
      ".io": 3.8
      ".net": 5.5
    allow_three_letter_com: true

# Reference data stores. Not scheduled — queried ad-hoc, typically during
# naming-exercise workflows. The dashboard's name browser joins these with
# the R2 + Parquet universe on `domain`.
references:
  supabase_master:
    kind: postgres_supabase
    project_url_env: SUPABASE_URL
    service_key_env: SUPABASE_SERVICE_ROLE_KEY
    table: 'public."Master Domain List"'
    primary_key: domain
    cadence: ad_hoc
    notes: |
      Curated brand-candidate domains with rich metadata (category, emotions,
      keywords, root_words, dictionary_word, syllables, sld_length,
      number_of_words, is_single_word) plus pricing/ownership.
      Trigram + tsvector indexes on `keywords` and `root_words` enable
      full-text and fuzzy search server-side; do not denormalize.

  supabase_naming:
    kind: postgres_supabase
    project_url_env: SUPABASE_NAMING_URL
    service_key_env: SUPABASE_NAMING_SERVICE_KEY
    table: 'public.name_universe'
    primary_key: domain
    cadence: daily
    notes: |
      The broad name universe — every domain ever observed across all wired
      sources that passes the universe_ingest filter. Populated by the
      universe_sync maintenance workflow (22:00 UTC daily). Has FDW back to
      Master Domain Name List so naming-exercise queries can JOIN against
      curated metadata in a single SQL statement. Will hold 5-15M rows at
      steady state; Phase 2 will add a vector(512) embedding column with
      HNSW index for semantic search.

      Operational notes:
        - The FDW server `snagged_master` MUST have
          `use_remote_estimate 'true'` set, otherwise JOIN queries time
          out because the planner assumes the remote table has no indexes
          and chooses a sequential scan instead of a primary-key lookup.
          Run after creating the foreign server:
            ALTER SERVER snagged_master
              OPTIONS (ADD use_remote_estimate 'true', ADD fetch_size '500');
            ALTER FOREIGN TABLE master_domain_list
              OPTIONS (ADD use_remote_estimate 'true');
        - Foreign-table column types must match the source: `keywords`,
          `emotions`, `root_words` are stored as comma-separated TEXT
          in the source, not as text[]. Use `text` in the foreign DDL
          and split with `string_to_array(col, ', ')` at query time
          if you need array semantics.

# Schedules are in UTC (GitHub Actions requirement). ET conversion:
#   winter ET = UTC-5    summer ET = UTC-4
# For now we use a single UTC time that's a tolerable fit year-round; revisit
# if ET-precision matters.

sources:
  # ===== Tier-1 sources (owned inventory) =====
  # Domains WE control (Snagged-owned, Rob-owned, or Snagged-brokered).
  # The naming exercise gives these preference but does NOT exclude
  # tier-2 results. Query pattern is:
  #   ORDER BY quality_score DESC, source_tier ASC, deal_score DESC
  # — high-quality tier-2 names still surface near the top; tier-1 wins
  # only when quality is equal or close. Oxley and other brokered
  # third-party inventories stay in tier-2.

  - source_id: snagged_snap_sheet
    product: snap
    kind: google_doc
    schedule_utc: "0 12 * * *"   # ~8 AM ET
    enabled: true
    notes: |
      Snagged-owned SNAP inventory. Reads tab 'SNAP' from the team's
      primary inventory sheet (1KaxYUgBFALe...). Filters to rows where
      'Still Owned?' is truthy. Price column: 'Internal Price'.
      Upserts as source_tier=1.

  - source_id: rob_purchases_sheet
    product: snap
    kind: google_doc
    schedule_utc: "0 12 * * *"   # ~8 AM ET
    enabled: true
    notes: |
      Rob-owned domain inventory. Reads tab 'Rob Purchases' from the
      team's primary inventory sheet (1KaxYUgBFALe...). Filters to rows
      where 'Still Owned?' is truthy. Price column: 'Atom Current Price'
      (Rob's domains are often priced via Atom listings).
      Upserts as source_tier=1.

  - source_id: snagged_marketplace_sheet
    product: snap
    kind: google_doc
    schedule_utc: "0 12 * * *"   # ~8 AM ET
    enabled: true
    notes: |
      Snagged Marketplace — domains brokered by Snagged on behalf of
      various owners. Reads tab 'Complete List' from the 'Snagged Names
      Under Representation' sheet (1hL_F0e3...). Filters to rows where
      'Active' is truthy. Price column: 'BIN'.
      Upserts as source_tier=1.

  # ===== SNAP producers =====

  - source_id: namecheap_bin
    product: snap
    kind: csv_dump
    schedule_utc: "25 9 * * *"     # ~5:25 AM ET
    enabled: true
    fetch:
      url: "https://d3ry1h4w5036x1.cloudfront.net/reports/Namecheap_Market_Sales_Buy_Now.csv"
    filters_profile: standard_listings
    sheet_destinations:
      - tab: "Today's New Listings"
        mode: replace_source_rows
    slack_channel_for: snap

  - source_id: afternic
    product: snap
    kind: csv_dump
    schedule_utc: "15 9 * * *"     # ~5:15 AM ET
    enabled: true
    fetch:
      url: "https://search.afternic.com/broker/all?id=zt5nchodbseszkp&compress=1"
      format: zip
    filters_profile: standard_listings
    sheet_destinations:
      - tab: "Today's New Listings"
        mode: replace_source_rows
      - tab: "Running Good Deals"
        mode: rebuild_owned_slice
    slack_channel_for: snap

  - source_id: atom_daily
    product: snap
    kind: csv_dump
    schedule_utc: "0 14 * * *"     # ~10:00 AM ET (after Atom updates the feed)
    enabled: true
    fetch:
      url: "http://atom.com/public/feeds/partner.csv"
    filters_profile: standard_listings
    sheet_destinations:
      - tab: "Today's New Listings"
        mode: replace_source_rows
      - tab: "Running Good Deals"
        mode: append_if_missing
    slack_channel_for: snap
    notes: |
      Direct partner feed fetch replaces the previous laptop-based flow that
      downloaded the CSV and uploaded it to the Atom Dumps Drive folder
      (1FFB8_8aTii5YQJheIQsJI0SqYRmFMg_4). That folder can be retired once
      this source has run cleanly for a few days.

  - source_id: atom_wholesale
    product: snap
    kind: google_doc
    schedule_utc: "5 14 * * *"     # ~10:05 AM ET
    enabled: true
    fetch:
      doc_id: "1-n-fiAOfTf9e5NaVSHCdgyNRTKdPuPBRx2A9XqwzczU"
    parser: llm_assisted            # Atom Wholesale doc is unstructured; uses Claude API
    sheet_destinations:
      - sheet_id_override: "1vrBxktnZ6cK5pY_w5EZa6DOA0E4OLU_Qs6x-fztDclw"
        tab: "Running"
        mode: prepend_new_rows
    slack_channel_for: snap

  - source_id: spaceship
    product: snap
    kind: api_export
    schedule_utc: "30 21 * * *"   # ~5:30 PM ET — after efty_partner at 5:00 PM ET
    enabled: true
    notes: |
      Spaceship SellerHub via the v1 REST API
      (GET /v1/sellerhub/domains, X-API-Key + X-API-Secret auth).
      Currently only returns OUR account's listings, not the full
      Spaceship marketplace — that's all the v1 public API exposes
      today (verified via 20-endpoint probe 2026-05-30: every
      plausible marketplace / aftermarket / partnership / discovery
      path returned 404). Emailed Spaceship support 2026-05-30 to ask
      about a partner endpoint that returns other sellers' listings;
      will widen this source once they respond.

      So this source today contributes only handful-to-dozens of rows
      per run (whatever we've personally listed on SellerHub) — but
      kept enabled because that handful is real and goes into the
      universe correctly.

  - source_id: oxley
    product: snap
    kind: scrape_json
    schedule_utc: "15 12 * * *"   # ~8:15 AM ET — after tier-1 sheets
    enabled: true
    notes: |
      Oxley.com — Efty-themed boutique marketplace, ~100 curated
      single-word .coms. Scraped via scrape.do (CF-protected; plain
      curl 403s). Homepage IS the catalog; no pagination needed.
      Extracts domains from /domain/<name>/ hrefs.

      Tier 2 (brokered third-party inventory, not Snagged-owned).
      Prices not captured in v1 — they live on individual /domain/
      pages which would require N+1 scrape.do calls. Defer to v2.

  - source_id: dynadot_dump
    product: snap
    kind: api_export
    schedule_utc: "45 21 * * *"   # ~5:45 PM ET
    enabled: true
    notes: |
      Full-inventory Dynadot daily dump for the universe pool, distinct
      from dynadot_auctions (24h time-sensitive watchlist for the
      auctions Slack/Sheets).

      Uses the same v1 /api3.json endpoint + get_open_auctions command +
      query-string key+secret auth — but with NO time horizon, so we
      paginate every open auction across the inventory rather than just
      ones ending within 24h. Matches the legacy openclaw flow described
      in dynadot_open_fetch.py, except the diff step is now implicit via
      Supabase's upsert merge (first_seen/last_seen/best_price tracked
      across days naturally).

  - source_id: dynadot_aftermarket
    product: snap
    kind: api_export
    enabled: false
    reason: |
      Distinct from dynadot_dump (which uses the legacy v1 get_open_auctions
      command). This would pull Dynadot's full aftermarket catalog via the
      v2 RESTful endpoint (GET /restful/v2/aftermarket/listings) — likely
      a richer / different dataset than v1's auctions-only view. Blocked
      on Dynadot v2 API access: existing DYNADOT_API_KEY and DYNADOT_API_SECRET
      both 401 against v2. Need to either generate a v2-specific token or
      email Dynadot support to enable v2 access. Keep dynadot_dump running
      as the working v1-based feeder until v2 is unlocked.

  - source_id: spaceship_marketplace
    product: snap
    kind: api_export
    enabled: false
    reason: |
      Distinct from the existing `spaceship` source, which uses the v1
      /sellerhub/domains endpoint and returns ONLY our own account's
      SellerHub listings (~5 rows). This would pull the full Spaceship
      marketplace — other sellers' inventory — for universe ingestion.

      Blocked: no buyer/discovery endpoint exists in the public v1 API.
      Probed ~20 plausible paths under /api/v1/ (marketplace/*,
      aftermarket/*, sellerhub/*, partnership/*, discovery/*, etc.) on
      2026-05-30; all returned 404. Emailed Spaceship support that day
      asking whether a Partner-tier endpoint exists or is on roadmap.
      Same shape as Atom's `partnership-search` or Dynadot's v2
      `aftermarket/listings`.

      Wire as a separate source once they enable / document it. Keep
      `spaceship` running in the meantime for our own SellerHub data.

  - source_id: sedo_dump
    product: snap
    kind: scrape_json
    enabled: false
    reason: |
      Full-inventory Sedo marketplace pull, distinct from the existing
      sedo_net_new + sedo_expired_auctions sources (which only capture the
      delta of new listings every 12h). Sedo is the only platform that
      lets us request "new since last run" via its filter API; that's
      great for SNAP/Slack signal but it means we never see the long
      tail of older listings sitting in the marketplace. A periodic full
      dump would catch them all.

      Blocked on access pattern: Sedo's public marketplace is millions of
      domains and there's no documented bulk-export endpoint. Options to
      investigate:
        (a) Sedo's MLS (Multiple Listing Service) feed for partners —
            may give us a periodic CSV / XML dump
        (b) Scraping the marketplace search pages (heavy, CF-protected,
            and likely against ToS)
        (c) Pulling via Spaceship's SellerHub integration since Spaceship
            cross-lists to Sedo MLS — would give us the Sedo overlap for
            free via the existing spaceship source

      Likely run cadence once wired: weekly full pull (the inventory is
      relatively stable; daily would be redundant given sedo_net_new
      already catches the new arrivals).

  # ===== Auctions producers (consumed by auctions_publish orchestrator) =====

  - source_id: dynadot_auctions
    product: auctions
    kind: scrape_json
    enabled: true

  - source_id: namecheap_auctions
    product: auctions
    kind: api_export
    enabled: true

  - source_id: drive_auction_uploads
    product: auctions
    kind: drive_file
    enabled: true
    fetch:
      drive_folder_id: "1vCnJb4iJeVJnLiRk4BwO7TEbRY16-Gta"
      window_hours: 36
      filename_pattern: "{d}-{m}-{yy}.csv"  # observed: 28-5-26.csv (D-M-YY, opposite of atom_daily)

  - source_id: dropcatch_auctions
    product: auctions
    kind: scrape_json
    enabled: true

  - source_id: parkio_auctions
    product: auctions
    kind: scrape_json
    enabled: true

  - source_id: godaddy_auctions
    product: auctions
    kind: api_export
    enabled: true

  - source_id: namesilo_auctions
    product: auctions
    kind: api_export
    enabled: true

  - source_id: sedo_expired_auctions
    product: auctions
    kind: api_export
    enabled: true

  - source_id: namejet_lastchance
    product: auctions
    kind: scrape_json
    enabled: true
    notes: "Direct Playwright scrape of NameJet's exclusive storefront last-chance
            rows (status In Auction, <24h to close). Falls back to a clear
            error if NameJet returns a Cloudflare challenge page — at that
            point we'd need CF_BROWSER_ACCOUNT_ID + CF_BROWSER_API_TOKEN
            for Cloudflare Browser Rendering API."

  - source_id: namejet_email_digest
    product: auctions
    kind: api_export
    enabled: false
    reason: "Replaced by drive_auction_uploads ingestion path."

  - source_id: namejet_exclusive_storefront
    product: auctions
    kind: scrape_json
    enabled: false
    reason: "Replaced by drive_auction_uploads ingestion path."

  # ===== Auctions orchestrator =====

  - source_id: auctions_publish
    product: auctions
    kind: orchestrator
    schedule_utc: "0 10 * * *"     # ~6:00 AM ET
    enabled: true
    orchestrates:
      - parkio_auctions
      - namecheap_auctions
      - dynadot_auctions
      - dropcatch_auctions
      - godaddy_auctions
      - namesilo_auctions
      - sedo_expired_auctions
      - drive_auction_uploads
      - namejet_lastchance
    failure_policy: continue_on_partial_failure

  - source_id: auctions_watchdog
    product: auctions
    kind: orchestrator
    schedule_utc: "35 10 * * *"    # ~6:35 AM ET
    enabled: true

  # ===== Aux feeds =====

  - source_id: sedo_net_new
    product: snap
    kind: api_export
    schedule_utc: "0 10,17,23 * * *"
    enabled: true
    sheet_destinations:
      - tab: "Sedo Net-New"   # owned tab on the SNAP sheet
        mode: rebuild_owned_slice

  - source_id: efty_partner
    product: snap
    kind: csv_dump
    schedule_utc: "0 21 * * *"     # ~5:00 PM ET
    enabled: true

  # ===== Maintenance =====

  - source_id: universe_sync
    product: aux
    kind: orchestrator
    schedule_utc: "0 22 * * *"     # ~6:00 PM ET — after efty_partner
    enabled: true
    notes: |
      Daily ingest into the supabase_naming reference. Walks every wired
      source's snapshot.json, applies the universe_ingest filter, merges
      across sources, and upserts into Supabase. Parquet partition is
      also written for historical archive (R2 if configured).
