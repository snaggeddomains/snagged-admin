name: 'Source: atom_daily'

# 0 14 * * * == ~10:00 AM ET (drifts ~1 hr across DST). Atom feed updates
# earlier in the morning so 14:00 UTC is well after.
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-atom_daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Run atom_daily
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_SNAP:          ${{ vars.SLACK_CHANNEL_SNAP }}
        run: pipeline run atom_daily

      - name: Commit state changes
        if: success()
        uses: ./.github/actions/commit-state
        with:
          message: "atom_daily: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
