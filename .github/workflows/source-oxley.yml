name: 'Source: oxley'

on:
  schedule:
    - cron: '15 12 * * *'   # 12:15 UTC = ~8:15 AM ET (after the tier-1 sheet sources)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-oxley
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run oxley
        env:
          SCRAPE_DO_TOKEN:             ${{ secrets.SCRAPE_DO_TOKEN }}
          SUPABASE_NAMING_URL:         ${{ secrets.SUPABASE_NAMING_URL }}
          SUPABASE_NAMING_SERVICE_KEY: ${{ secrets.SUPABASE_NAMING_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: pipeline run oxley
      - name: Commit state changes
        if: success()
        uses: ./.github/actions/commit-state
        with:
          message: "oxley: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
