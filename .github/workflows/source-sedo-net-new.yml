name: 'Source: sedo_net_new'

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-sedo_net_new
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run sedo_net_new
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_SNAP:          ${{ vars.SLACK_CHANNEL_SNAP }}
        run: pipeline run sedo_net_new
      - name: Commit state changes
        if: success()
        uses: ./.github/actions/commit-state
        with:
          message: "sedo_net_new: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
