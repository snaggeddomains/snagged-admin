name: 'Source: atom_wholesale'

# Target schedule: '5 14 * * *' UTC == ~10:05 AM ET.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-atom_wholesale
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run atom_wholesale
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_SNAP:          ${{ vars.SLACK_CHANNEL_SNAP }}
        run: pipeline run atom_wholesale
      - name: Commit state changes
        if: success()
        run: |
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "atom_wholesale: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
