name: 'Probe: spaceship marketplace endpoints'

# One-off diagnostic to find the right endpoint for browsing the FULL
# Spaceship marketplace (not just our own SellerHub listings, which
# /v1/sellerhub/domains returns).
#
# Tries a list of plausible endpoint paths with our existing API key +
# secret, logging status + body snippet for each. After we know which
# one works, delete this workflow file.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe candidate endpoints
        env:
          SPACESHIP_API_KEY:    ${{ secrets.SPACESHIP_API_KEY }}
          SPACESHIP_API_SECRET: ${{ secrets.SPACESHIP_API_SECRET }}
        run: |
          set -u
          BASE="https://spaceship.dev/api"
          PATHS=(
            "/v1/marketplace/listings"
            "/v1/marketplace/search"
            "/v1/marketplace/domains"
            "/v1/marketplace"
            "/v1/aftermarket/listings"
            "/v1/aftermarket/domains"
            "/v1/aftermarket"
            "/v1/sellerhub/marketplace"
            "/v1/sellerhub/listings"
            "/v1/sellerhub/search"
            "/v1/sellerhub/inventory"
            "/v1/partnership/listings"
            "/v1/partner/listings"
            "/v1/partners/listings"
            "/v1/listings"
            "/v1/listings/search"
            "/v1/domains/marketplace"
            "/v1/domains/search"
            "/v1/search"
            "/v1/discovery"
            "/v1/discovery/listings"
          )
          QUERY="take=5&skip=0"

          for path in "${PATHS[@]}"; do
            url="${BASE}${path}?${QUERY}"
            echo "============================================="
            echo "GET ${url}"
            STATUS=$(curl -s -o /tmp/body.json -w '%{http_code}' \
              -H "X-API-Key: ${SPACESHIP_API_KEY}" \
              -H "X-API-Secret: ${SPACESHIP_API_SECRET}" \
              -H "Accept: application/json" \
              "${url}")
            echo "HTTP ${STATUS}"
            echo "--- body (first 400 chars) ---"
            head -c 400 /tmp/body.json
            echo ""
            sleep 0.5   # politeness, don't hammer
          done

          echo ""
          echo "============================================="
          echo "Probe complete. Look for any 200 response with a non-error"
          echo "body. That's the endpoint to wire."
