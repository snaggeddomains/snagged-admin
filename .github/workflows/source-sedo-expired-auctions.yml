name: 'Source: sedo_expired_auctions'

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-sedo_expired_auctions
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run sedo_expired_auctions
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_AUCTIONS:      ${{ vars.SLACK_CHANNEL_AUCTIONS }}
        run: pipeline run sedo_expired_auctions
      - name: Commit state changes
        if: success()
        uses: ./.github/actions/commit-state
        with:
          message: "sedo_expired_auctions: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
