name: 'Probe: oxley.com data location (JSON blob vs AJAX endpoint)'

# Last probe ruled out sitemap.xml. This one answers a binary question:
# does the homepage HTML contain all 1,412 domain references (just
# hidden by CSS until "Show more" is clicked), or are the missing 1,401
# fetched via a separate API call?
#
#   - count of /domain/<name>/ links in the raw homepage HTML
#   - count of bare 'sld.tld' strings in the homepage (would catch
#     domain names embedded in JSON without the URL wrapper)
#   - hunt for inline JSON blobs (window.__INITIAL_STATE__, var domains
#     = [...], etc.)
#   - inspect robots.txt for a sitemap clue (sometimes Efty puts it
#     in a non-standard path)
#   - try /robots.txt + a few specific Efty AJAX patterns

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine homepage data location
        env:
          SCRAPE_DO_TOKEN: ${{ secrets.SCRAPE_DO_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${SCRAPE_DO_TOKEN:-}" ]; then echo "SCRAPE_DO_TOKEN not set."; exit 1; fi

          fetch() {
            local url="$1" outfile="$2"
            local encoded
            encoded=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$url")
            curl -s -o "$outfile" -w '%{http_code}' \
              "https://api.scrape.do/?token=${SCRAPE_DO_TOKEN}&url=${encoded}&render=true&super=true&geoCode=us"
          }

          STATUS=$(fetch "https://oxley.com/" /tmp/home.html)
          echo "Homepage HTTP ${STATUS}, $(wc -c < /tmp/home.html) bytes"
          echo ""

          # ---- Are there 1412 domain refs hidden in the HTML? ----
          echo "============================================="
          echo "Q1: Are all 1,412 domains in the static HTML or not?"
          echo "============================================="
          DOMAIN_LINKS=$(grep -oE 'oxley\.com/domain/[a-z0-9][a-z0-9.-]+/' /tmp/home.html | sort -u | wc -l)
          echo "  Unique /domain/<name>/ links: ${DOMAIN_LINKS}"

          BARE_DOMAINS=$(grep -oiE '\b[a-z][a-z0-9-]{2,30}\.(com|net|org|io|ai|co|xyz|app|dev)\b' /tmp/home.html \
            | grep -ivE '(jquery|bootstrapcdn|jsdelivr|google-analytics|googleapis|efty\.com|oxley\.com|cloudflare|fontawesome|altcha|maxcdn|jsdelivr)' \
            | sort -u | wc -l)
          echo "  Unique bare 'sld.tld' strings (non-CDN): ${BARE_DOMAINS}"
          echo "  --> if either is ~1400, all data is in the HTML (just hidden)"
          echo "  --> if both are ~30, the rest comes from a separate API call"

          echo ""
          # ---- Look for inline JSON blobs ----
          echo "============================================="
          echo "Q2: Is there a JSON blob with domain data inline?"
          echo "============================================="
          echo "  Looking for window.__... / window._ ... assignments:"
          grep -oE 'window\.[A-Z_a-z]+ ?= ?[\{\[]' /tmp/home.html | sort -u | head -10 || true
          echo "  Looking for 'var domains' / 'let domains' / 'const domains':"
          grep -nE '(var|let|const) +[a-z_]*[Dd]omain' /tmp/home.html | head -10 || true
          echo "  Looking for large JSON arrays in <script> tags (>5K chars):"
          python3 - <<'PY' || true
          import re, sys
          html = open('/tmp/home.html').read()
          for m in re.finditer(r'<script[^>]*>(.*?)</script>', html, re.DOTALL | re.IGNORECASE):
              body = m.group(1)
              if len(body) > 5000 and ('domain' in body.lower() or '"name"' in body.lower() or 'sld' in body.lower()):
                  print(f"  Large script block ({len(body)} chars), first 300 chars:")
                  print("  " + body[:300].replace("\n"," ") + " ...")
                  print()
          PY

          echo ""
          # ---- robots.txt for sitemap hint ----
          echo "============================================="
          echo "Q3: robots.txt — does it point to a sitemap or block paths?"
          echo "============================================="
          STATUS=$(fetch "https://oxley.com/robots.txt" /tmp/robots.txt)
          echo "  HTTP ${STATUS}"
          cat /tmp/robots.txt 2>/dev/null | head -20 || true

          echo ""
          # ---- Try the 'Show more' button via per_page hack ----
          echo "============================================="
          echo "Q4: Does oxley.com accept ?per_page=N or similar to render everything?"
          echo "============================================="
          for q in "?per_page=2000" "?limit=2000" "?show=all" "?all=1" "?page_size=2000" "?count=2000"; do
            url="https://oxley.com/${q}"
            STATUS=$(fetch "$url" /tmp/qbody.html)
            SIZE=$(wc -c < /tmp/qbody.html)
            DCOUNT=$(grep -oE 'oxley\.com/domain/[a-z0-9][a-z0-9.-]+/' /tmp/qbody.html | sort -u | wc -l)
            echo "  ${q} → HTTP ${STATUS}, ${SIZE} bytes, ${DCOUNT} /domain/ refs"
            sleep 0.5
          done

          echo ""
          echo "============================================="
          echo "Done."
