name: 'Probe: oxley.com structure'

# One-off diagnostic to see what oxley.com returns when fetched through
# scrape.do (its CF tier blocks plain curl / WebFetch). Captures the
# rendered HTML body so we can identify selectors and pagination for
# the eventual oxley source module. Delete this file once the source is
# wired.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch oxley.com via scrape.do (super proxies, render)
        env:
          SCRAPE_DO_TOKEN: ${{ secrets.SCRAPE_DO_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${SCRAPE_DO_TOKEN:-}" ]; then
            echo "SCRAPE_DO_TOKEN not set — aborting."
            exit 1
          fi

          # Try the homepage first, then a few likely inventory paths.
          PATHS=(
            "/"
            "/inventory"
            "/domains"
            "/marketplace"
            "/sale"
            "/sitemap.xml"
            "/robots.txt"
          )

          for path in "${PATHS[@]}"; do
            url="https://oxley.com${path}"
            encoded_url=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$url")
            echo ""
            echo "============================================="
            echo "GET ${url}"

            STATUS=$(curl -s -o /tmp/body.html -w '%{http_code}' \
              "https://api.scrape.do/?token=${SCRAPE_DO_TOKEN}&url=${encoded_url}&render=true&super=true&geoCode=us")

            SIZE=$(wc -c < /tmp/body.html)
            echo "HTTP ${STATUS}, body ${SIZE} bytes"

            # Quick structural fingerprinting
            echo "--- title: ---"
            grep -ioE '<title[^>]*>[^<]*</title>' /tmp/body.html | head -1 || echo "(no title)"
            echo "--- domain-looking strings (first 30): ---"
            grep -oE '[a-z][a-z0-9-]{2,30}\.(com|net|org|io|ai|co|xyz|app|dev)' /tmp/body.html | sort -u | head -30
            echo "--- pagination hints (first 5): ---"
            grep -oE '(href|action|src)="[^"]*(page|p=|offset|start)[^"]*"' /tmp/body.html | head -5
            echo "--- 'sale' / 'inventory' / 'marketplace' mentions: ---"
            grep -ciE 'for sale|inventory|marketplace|buy now|available' /tmp/body.html
            echo "--- script src origins (first 5): ---"
            grep -oE 'src="https?://[^"]+\.js"' /tmp/body.html | head -5

            sleep 1
          done

          echo ""
          echo "============================================="
          echo "Done. Use the domain-looking strings + pagination hints to plan the source."
