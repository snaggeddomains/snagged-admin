name: 'Probe: oxley.com catalog discovery'

# Second-pass probe. The first one confirmed scrape.do works against
# oxley.com (Efty-powered marketplace) and saw ~30 domains on the
# homepage, but didn't surface the full catalog URL. This probe:
#   1. Fetches the homepage
#   2. Extracts every internal link (href) on the page
#   3. Tries Efty-standard catalog paths
#   4. Reports the URL with the most domain-looking strings (probably
#      the full inventory page or first paginated page)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Discover oxley.com catalog structure
        env:
          SCRAPE_DO_TOKEN: ${{ secrets.SCRAPE_DO_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${SCRAPE_DO_TOKEN:-}" ]; then
            echo "SCRAPE_DO_TOKEN not set — aborting."
            exit 1
          fi

          fetch() {
            local url="$1"
            local outfile="$2"
            local encoded
            encoded=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$url")
            curl -s -o "$outfile" -w '%{http_code}' \
              "https://api.scrape.do/?token=${SCRAPE_DO_TOKEN}&url=${encoded}&render=true&super=true&geoCode=us"
          }

          count_domains() {
            grep -oE '[a-z][a-z0-9-]{2,30}\.(com|net|org|io|ai|co|xyz|app|dev)' "$1" \
              | grep -ivE '(jquery|bootstrapcdn|jsdelivr|google-analytics|googleapis|efty\.com|oxley\.com|cloudflare|fontawesome|altcha)' \
              | sort -u | wc -l
          }

          echo "============================================="
          echo "STEP 1: Fetch homepage + extract internal nav links"
          echo "============================================="
          STATUS=$(fetch "https://oxley.com/" /tmp/home.html)
          echo "Homepage HTTP ${STATUS}, $(wc -c < /tmp/home.html) bytes"
          echo ""
          echo "--- Internal hrefs found (unique, non-CSS/JS): ---"
          grep -oE 'href="[^"]+"' /tmp/home.html \
            | sed -E 's/href="([^"]+)"/\1/' \
            | grep -E '^(/|https?://(www\.)?oxley\.com)' \
            | grep -vE '\.(css|js|png|jpg|svg|ico|woff|woff2|ttf)([?#]|$)' \
            | sort -u \
            | head -40
          echo ""
          echo "--- Domain count on homepage: $(count_domains /tmp/home.html) ---"
          echo ""
          echo "--- Pagination-looking URL params anywhere on page: ---"
          grep -oE '[?&](page|p|start|offset|skip)=[0-9]+' /tmp/home.html | sort -u | head -10

          echo ""
          echo "============================================="
          echo "STEP 2: Try common Efty catalog paths"
          echo "============================================="
          PATHS=(
            "/buy-a-domain"
            "/buy-domain"
            "/browse"
            "/all"
            "/all-names"
            "/all-domains"
            "/catalog"
            "/list"
            "/category/all"
            "/page/1"
            "/?page=1"
            "/?p=1"
            "/?start=0"
          )

          for path in "${PATHS[@]}"; do
            url="https://oxley.com${path}"
            STATUS=$(fetch "$url" /tmp/body.html)
            SIZE=$(wc -c < /tmp/body.html)
            if [ "$STATUS" = "200" ]; then
              DOMAINS=$(count_domains /tmp/body.html)
              echo "  ${path} → HTTP ${STATUS}, ${SIZE} bytes, ${DOMAINS} unique domains"
              if [ "$DOMAINS" -gt 50 ]; then
                echo "    ✓ Looks like the inventory page. Sample domains:"
                grep -oE '[a-z][a-z0-9-]{2,30}\.(com|net|org|io|ai|co|xyz|app|dev)' /tmp/body.html \
                  | grep -ivE '(jquery|bootstrapcdn|jsdelivr|google-analytics|googleapis|efty\.com|oxley\.com|cloudflare|fontawesome|altcha)' \
                  | sort -u | head -15
              fi
            else
              echo "  ${path} → HTTP ${STATUS}"
            fi
            sleep 0.5
          done

          echo ""
          echo "============================================="
          echo "Done. The URL with the highest domain count is the catalog entry point."
