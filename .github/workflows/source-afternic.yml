name: 'Source: afternic'

# 15 9 * * * == ~5:15 AM ET (drifts ~1 hr across DST).
on:
  schedule:
    - cron: '15 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-afternic
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Run afternic
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_SNAP:          ${{ vars.SLACK_CHANNEL_SNAP }}
        run: pipeline run afternic

      - name: Commit state changes
        if: success()
        uses: ./.github/actions/commit-state
        with:
          message: "afternic: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
