name: 'Source: namecheap_bin'

# Schedule will be enabled once the source implementation lands.
# Until then, this workflow is manual-trigger only.
# Target schedule: '25 9 * * *' UTC == ~5:25 AM ET.
on:
  workflow_dispatch: {}

permissions:
  contents: write   # commit updated state/ back to the repo

concurrency:
  group: source-namecheap_bin
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Run namecheap_bin
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          R2_ACCESS_KEY_ID:            ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:        ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:                   ${{ vars.R2_BUCKET }}
          R2_ENDPOINT:                 ${{ vars.R2_ENDPOINT }}
          SLACK_CHANNEL_SNAP:          ${{ vars.SLACK_CHANNEL_SNAP }}
        run: pipeline run namecheap_bin

      - name: Commit state changes
        if: success()
        run: |
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "namecheap_bin: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Upload raw artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: namecheap_bin-${{ github.run_id }}
          path: /tmp/marketplace_pipeline/raw/
          retention-days: 14
          if-no-files-found: ignore
