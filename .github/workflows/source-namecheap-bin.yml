name: 'Source: namecheap_bin'

# Schedule in UTC. 25 9 * * * == ~5:25 AM ET (drifts ~1 hr across DST).
on:
  schedule:
    - cron: '25 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write   # commit updated state/ back to the repo

concurrency:
  group: source-namecheap_bin
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Run namecheap_bin
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_SNAP:          ${{ vars.SLACK_CHANNEL_SNAP }}
        run: pipeline run namecheap_bin

      - name: Commit state changes
        if: success()
        run: |
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "namecheap_bin: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Upload raw artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: namecheap_bin-${{ github.run_id }}
          path: /tmp/marketplace_pipeline/raw/
          retention-days: 14
          if-no-files-found: ignore
