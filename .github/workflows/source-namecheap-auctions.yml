name: 'Source: namecheap_auctions'

# Schedule will be enabled once the source's first manual run is verified.
# Target: '0 10 * * *' UTC == ~6:00 AM ET (auctions cadence).
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-namecheap_auctions
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Run namecheap_auctions
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_AUCTIONS:      ${{ vars.SLACK_CHANNEL_AUCTIONS }}
        run: pipeline run namecheap_auctions

      - name: Commit state changes
        if: success()
        uses: ./.github/actions/commit-state
        with:
          message: "namecheap_auctions: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
