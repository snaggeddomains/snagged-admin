name: 'Source: dynadot_auctions'

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-dynadot_auctions
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run dynadot_auctions
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_AUCTIONS:      ${{ vars.SLACK_CHANNEL_AUCTIONS }}
          DYNADOT_API_KEY:             ${{ secrets.DYNADOT_API_KEY }}
          DYNADOT_API_SECRET:          ${{ secrets.DYNADOT_API_SECRET }}
        run: pipeline run dynadot_auctions
      - name: Commit state changes
        if: success()
        run: |
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "dynadot_auctions: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
