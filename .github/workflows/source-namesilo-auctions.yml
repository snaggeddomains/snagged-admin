name: 'Source: namesilo_auctions'

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-namesilo_auctions
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run namesilo_auctions
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_AUCTIONS:      ${{ vars.SLACK_CHANNEL_AUCTIONS }}
          NAMESILO_API_KEY:            ${{ secrets.NAMESILO_API_KEY }}
        run: pipeline run namesilo_auctions
      - name: Commit state changes
        if: success()
        run: |
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "namesilo_auctions: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
