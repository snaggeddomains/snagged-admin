name: 'Source: dropcatch_auctions'

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-dropcatch_auctions
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Playwright + chromium install adds ~3-5 min on top of usual runtime
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run dropcatch_auctions
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_AUCTIONS:      ${{ vars.SLACK_CHANNEL_AUCTIONS }}
        run: pipeline run dropcatch_auctions

      - name: Commit state changes
        if: success()
        run: |
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "dropcatch_auctions: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
