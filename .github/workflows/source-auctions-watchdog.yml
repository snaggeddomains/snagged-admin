name: 'Source: auctions_watchdog'

# 35 min after the orchestrator (~6:35 AM ET).
on:
  schedule:
    - cron: '35 10 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-auctions_watchdog
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Install Playwright Chromium
        # Required if the watchdog needs to retry dropcatch_auctions or
        # namejet_lastchance.
        run: python -m playwright install --with-deps chromium

      - name: Run auctions_watchdog
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_AUCTIONS:      ${{ vars.SLACK_CHANNEL_AUCTIONS }}
          DYNADOT_API_KEY:             ${{ secrets.DYNADOT_API_KEY }}
          DYNADOT_API_SECRET:          ${{ secrets.DYNADOT_API_SECRET }}
          NAMESILO_API_KEY:            ${{ secrets.NAMESILO_API_KEY }}
          SCRAPE_DO_TOKEN:             ${{ secrets.SCRAPE_DO_TOKEN }}
          CF_BROWSER_ACCOUNT_ID:       ${{ secrets.CF_BROWSER_ACCOUNT_ID }}
          CF_BROWSER_API_TOKEN:        ${{ secrets.CF_BROWSER_API_TOKEN }}
        run: pipeline run auctions_watchdog

      - name: Commit state changes
        if: success() || failure()
        uses: ./.github/actions/commit-state
        with:
          message: "auctions_watchdog: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
