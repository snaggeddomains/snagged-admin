name: 'Source: drive_auction_uploads'

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-drive_auction_uploads
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run drive_auction_uploads
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_AUCTIONS:      ${{ vars.SLACK_CHANNEL_AUCTIONS }}
        run: pipeline run drive_auction_uploads
      - name: Commit state changes
        if: success()
        run: |
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "drive_auction_uploads: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
