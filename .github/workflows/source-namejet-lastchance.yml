name: 'Source: namejet_lastchance'

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: source-namejet_lastchance
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Playwright install + multi-page render
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run namejet_lastchance
        env:
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_CHANNEL_AUCTIONS:      ${{ vars.SLACK_CHANNEL_AUCTIONS }}
          CF_BROWSER_ACCOUNT_ID:       ${{ secrets.CF_BROWSER_ACCOUNT_ID }}
          CF_BROWSER_API_TOKEN:        ${{ secrets.CF_BROWSER_API_TOKEN }}
        run: pipeline run namejet_lastchance

      - name: Commit state changes
        if: success()
        run: |
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "namejet_lastchance: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
